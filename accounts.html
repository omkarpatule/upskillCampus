<!DOCTYPE html>
<html>
<head>
  <title>Society Accounts - Shantai Niwas B</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
    }

    header {
      background: #0f2027;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h2 {
      margin: 0;
    }

    .back-btn {
      background: #2c5364;
      color: white;
      border: none;
      padding: 8px 15px;
      cursor: pointer;
      border-radius: 5px;
    }

    .container {
      padding: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .card h3 {
      margin-top: 0;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
    }

    input, select {
      padding: 10px;
      margin: 5px 5px 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #2c5364;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #203a43;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    th {
      background: #f1f1f1;
    }

    .summary-box {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    .summary-item {
      background: #e9eef3;
      padding: 15px 25px;
      border-radius: 8px;
      margin: 10px;
      font-size: 16px;
    }

    .balance {
      background: #d4edda;
      font-weight: bold;
    }

    @media(max-width: 768px) {
      .summary-box {
        flex-direction: column;
        align-items: center;
      }
    }

  </style>

</head>

<body>

<header>
  <h2>Society Accounts - January 2026</h2>
  <button class="back-btn" onclick="window.location.href='dashboard.html'">
    Back
  </button>
</header>

<div class="container">

  <!-- 🔹 Add Transaction -->
  <div class="card" id="transactionForm">
    <h3>Add Transaction</h3>

    <input type="number" id="amount" placeholder="Amount">
    <input type="text" id="description" placeholder="Description">

    <select id="type">
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>

    <button onclick="addTransaction()">Add Transaction</button>
  </div>


  <!-- 🔹 Summary -->
  <div class="card">
    <h3>Financial Summary</h3>

    <div class="summary-box">

      <div class="summary-item">
        Total Income: ₹ <span id="totalIncome">0</span>
      </div>

      <div class="summary-item">
        Total Expense: ₹ <span id="totalExpense">0</span>
      </div>

      <div class="summary-item balance">
        Balance: ₹ <span id="balance">0</span>
      </div>

    </div>
  </div>


  <!-- 🔹 Transactions Table -->
  <div class="card">
    <h3>Transactions</h3>

    <table id="transactionsTable">
      <thead>
        <tr>
          <th>Amount</th>
          <th>Description</th>
          <th>Type</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table>

  </div>

</div>

<script type="module" src="accounts.js"></script>

</body>
</html>
