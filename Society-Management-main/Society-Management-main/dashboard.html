<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Shantai Niwas B</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h2>Shantai Niwas B - Dashboard</h2>
  <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- 🔹 Stats Cards -->
  <div class="card">
    <h3>Society Overview</h3>

    <div class="summary-box">

      <div class="summary-item">
        Total Residents: <b id="totalUsers">0</b>
      </div>

      <div class="summary-item">
        Pending Approvals: <b id="pendingUsers">0</b>
      </div>

      <div class="summary-item">
        Total Complaints: <b id="totalComplaints">0</b>
      </div>

      <div class="summary-item">
        Today's Tankers: <b id="todayTankers">0</b>
      </div>

    </div>
  </div>

  <!-- 🔹 Quick Navigation -->
  <div class="card">
    <h3>Quick Access</h3>

    <button onclick="goTo('accounts.html')">Accounts</button>
    <button onclick="goTo('complaints.html')">Complaints</button>
    <button onclick="goTo('tanker.html')">Tanker</button>

  </div>

</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
