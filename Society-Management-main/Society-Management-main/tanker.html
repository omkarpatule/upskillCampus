<!DOCTYPE html>
<html>
<head>
  <title>Tanker Tracking - Shantai Niwas B</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h2>Tanker Management</h2>
  <button class="back-btn"
    onclick="window.location.href='dashboard.html'">
    Back
  </button>
</header>

<div class="container">

  <!-- 🔹 Upload Section -->
  <div class="card" id="uploadSection">
    <h3>Upload Tanker Entry</h3>

    <input type="text"
           id="tankerNumber"
           placeholder="Tanker Number (MH-12-AB-1234)">

    <input type="number"
           id="waterQuantity"
           placeholder="Water Quantity (Liters)">

    <input type="file"
           id="tankerImage"
           accept="image/*">

    <button onclick="uploadTanker()">
      Upload Tanker
    </button>
  </div>


  <!-- 🔹 Tanker History -->
  <div class="card">
    <h3>Recent Tankers</h3>

    <h4 id="todayCount"
        style="margin-bottom:15px; color:#2c5364;">
    </h4>

    <div id="tankerList">
      <p>No tanker history.</p>
    </div>

  </div>

</div>

<script type="module" src="tanker.js"></script>

</body>
</html>
